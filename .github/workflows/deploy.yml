name: Deploy Zipplearn to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect base path
        id: base
        run: |
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            BASE_PATH=""
          else
            BASE_PATH="/${REPO_NAME}"
          fi
          echo "BASE_PATH=${BASE_PATH}" >> $GITHUB_OUTPUT
          echo "Base path: ${BASE_PATH}"

      - name: Generate build version
        id: version
        run: |
          TS="${{ github.event.head_commit.timestamp }}"
          if [ -z "$TS" ]; then TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ"); fi
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_VERSION="${TS}-${SHA}"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> $GITHUB_OUTPUT

      - name: Build dist
        env:
          BASE_PATH: ${{ steps.base.outputs.BASE_PATH }}
          BUILD_VERSION: ${{ steps.version.outputs.BUILD_VERSION }}
        run: |
          mkdir -p dist

          # sw.js — inject version and base path
          sed \
            -e "s|__BUILD_VERSION__|${BUILD_VERSION}|g" \
            -e "s|'/'|'${BASE_PATH}/'|g" \
            -e "s|'/index.html'|'${BASE_PATH}/index.html'|g" \
            -e "s|'/manifest.json'|'${BASE_PATH}/manifest.json'|g" \
            sw.js > dist/sw.js

          # manifest.json — only patch start_url and shortcut urls
          # (icons are inline base64 data URIs, no file paths to patch)
          sed \
            -e "s|\"start_url\": \"/\"|\"start_url\": \"${BASE_PATH}/\"|g" \
            -e "s|\"url\": \"/?|\"url\": \"${BASE_PATH}/?|g" \
            manifest.json > dist/manifest.json

          # index.html — patch manifest link and sw registration path
          sed \
            -e "s|href=\"manifest.json\"|href=\"${BASE_PATH}/manifest.json\"|g" \
            -e "s|register('sw.js')|register('${BASE_PATH}/sw.js')|g" \
            index.html > /tmp/index_patched.html

          # Re-bundle js/ if present, otherwise use pre-bundled index.html
          if [ -d "js" ] && ls js/*.js > /dev/null 2>&1; then
            python3 bundle.py /tmp/index_patched.html dist/index.html
          else
            cp /tmp/index_patched.html dist/index.html
          fi

          echo "dist/ contents:"
          find dist -type f | sort
          echo "index.html: $(wc -l < dist/index.html) lines"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "## Zipplearn deployed!" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base | ${{ steps.base.outputs.BASE_PATH }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.BUILD_VERSION }} |" >> $GITHUB_STEP_SUMMARY
