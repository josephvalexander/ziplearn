<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep violet rounded square -->
  <rect width="512" height="512" rx="96" fill="#1a0533"/>
  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1a0533" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>
  <!-- Lightning bolt: bold, centered, white -->
  <polygon
    points="296,48 136,276 224,276 216,464 376,236 288,236"
    fill="white"
    opacity="0.97"
  />
  <!-- Subtle inner glow on bolt -->
  <polygon
    points="296,48 136,276 224,276 216,464 376,236 288,236"
    fill="none"
    stroke="#a78bfa"
    stroke-width="6"
    opacity="0.35"
  />
</svg>
